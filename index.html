<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Onyx Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        iosBg: '#f2f2f7',
                        iosBlue: '#007aff',
                        iosGreen: '#34c759',
                        iosRed: '#ff3b30',
                        textMain: '#1c1c1e',
                        textMuted: '#8e8e93'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            color: #1c1c1e;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            overflow-x: hidden;
        }

        /* Анимированный фон (эффект жидкости под стеклом) */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            background: #f2f2f7;
            overflow: hidden;
        }
        .liquid-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 15s infinite alternate ease-in-out;
        }
        .blob-1 { width: 300px; height: 300px; background: #ff2a6d; top: -10%; left: -10%; }
        .blob-2 { width: 400px; height: 400px; background: #007aff; bottom: 20%; right: -20%; animation-delay: -5s; }
        .blob-3 { width: 350px; height: 350px; background: #34c759; top: 40%; left: -20%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Стили жидкого стекла */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04), inset 0 1px 1px rgba(255, 255, 255, 0.8);
        }

        .liquid-glass-modal {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border-top: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.05);
        }

        .liquid-input {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            backdrop-filter: blur(10px);
        }

        .gradient-text {
            background: linear-gradient(135deg, #000000 0%, #434343 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="flex justify-center min-h-screen bg-gray-100">

    <!-- Абстрактный жидкий фон -->
    <div class="liquid-bg">
        <div class="liquid-blob blob-1"></div>
        <div class="liquid-blob blob-2"></div>
        <div class="liquid-blob blob-3"></div>
    </div>

    <!-- Мобильный контейнер -->
    <div class="w-full max-w-md min-h-screen flex flex-col relative z-10 shadow-2xl overflow-y-auto hide-scroll">
        
        <!-- HEADER -->
        <header class="sticky top-0 z-40 px-6 pt-10 pb-4 liquid-glass border-b-0 rounded-b-3xl">
            <div class="flex justify-between items-end">
                <div>
                    <p id="header-date" class="text-[11px] font-bold text-textMuted uppercase tracking-widest mb-1">МАЙ 25</p>
                    <h1 id="page-title" class="text-3xl font-extrabold tracking-tight gradient-text">Главная</h1>
                </div>
                <div class="w-10 h-10 rounded-full liquid-glass flex items-center justify-center shadow-sm">
                    <span class="text-sm font-bold text-black">AR</span>
                </div>
            </div>
        </header>

        <!-- КОНТЕНТ -->
        <main class="flex-1 px-5 pt-6 space-y-6 pb-32">
            
            <!-- Вкладка 1: Дашборд -->
            <section id="view-dashboard" class="space-y-6 animate-fade-in">
                
                <!-- Главный баланс (Liquid Card) -->
                <div class="liquid-glass rounded-[32px] p-6 relative overflow-hidden text-center">
                    <p class="text-sm font-semibold text-textMuted">Мне должны</p>
                    <p id="stat-total-amount" class="text-5xl font-black tracking-tighter text-black mt-2 mb-1">0 смн</p>
                    <p id="stat-total-original" class="text-xs font-medium text-textMuted">Изначально: 0 смн</p>
                    
                    <div class="mt-6">
                        <div class="flex justify-between text-xs font-bold text-black mb-2">
                            <span>Возвращено</span>
                            <span id="global-progress-percent">0%</span>
                        </div>
                        <div class="w-full bg-black/5 h-3 rounded-full overflow-hidden p-0.5">
                            <div id="global-progress-bar" class="h-full bg-black rounded-full transition-all duration-700" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Крупнейшие долги -->
                <div>
                    <h3 class="text-lg font-bold text-black mb-3 px-1">Топ долгов</h3>
                    <div id="dashboard-top-debts" class="space-y-3">
                        <!-- Динамический контент -->
                    </div>
                </div>
            </section>

            <!-- Вкладка 2: Список -->
            <section id="view-debts" class="space-y-5 hidden animate-fade-in">
                <div class="liquid-glass rounded-2xl p-1.5 flex items-center shadow-sm">
                    <div class="pl-3 text-textMuted">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                    <input type="text" id="search-input" placeholder="Поиск по имени..." class="w-full bg-transparent border-none text-sm px-3 py-2 text-black placeholder-textMuted focus:outline-none font-medium">
                </div>

                <!-- Простой переключатель (Сегменты) -->
                <div class="flex gap-2">
                    <button onclick="setFilter('all')" id="filter-all" class="flex-1 py-2 text-sm font-bold rounded-2xl liquid-glass text-black">Все</button>
                    <button onclick="setFilter('active')" id="filter-active" class="flex-1 py-2 text-sm font-semibold rounded-2xl bg-white/30 text-textMuted transition">Активные</button>
                    <button onclick="setFilter('partial')" id="filter-partial" class="flex-1 py-2 text-sm font-semibold rounded-2xl bg-white/30 text-textMuted transition">В процессе</button>
                </div>

                <div id="debts-list-container" class="space-y-3"></div>
            </section>

            <!-- Вкладка 3: Аналитика -->
            <section id="view-analytics" class="space-y-6 hidden animate-fade-in">
                <div class="liquid-glass rounded-[32px] p-6">
                    <h3 class="text-center text-sm font-bold text-textMuted mb-6">Распределение долгов</h3>
                    <div class="relative h-64">
                        <canvas id="chart-analytics"></canvas>
                    </div>
                </div>

                <div class="liquid-glass rounded-[32px] p-6 space-y-4">
                    <div class="flex justify-between items-center border-b border-black/5 pb-3">
                        <span class="text-sm font-medium text-textMuted">Всего записей</span>
                        <span id="insight-count" class="text-lg font-bold text-black">0</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-black/5 pb-3">
                        <span class="text-sm font-medium text-textMuted">Средний долг</span>
                        <span id="insight-avg" class="text-lg font-bold text-black">0 смн</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium text-textMuted">Полностью закрыты</span>
                        <span id="insight-closed" class="text-lg font-bold text-iosGreen">0</span>
                    </div>
                </div>
            </section>
        </main>

        <!-- FLOATING ACTION BUTTON -->
        <button onclick="openAddModal()" class="fixed bottom-28 right-6 w-16 h-16 rounded-full bg-black shadow-2xl flex items-center justify-center text-white z-40 hover:scale-105 active:scale-95 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        </button>

        <!-- BOTTOM NAVIGATION -->
        <nav class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto liquid-glass rounded-t-[40px] border-b-0 h-24 flex items-start justify-around px-4 pt-4 z-40 safe-bottom">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex flex-col items-center gap-1.5 text-black">
                <div class="w-12 h-8 rounded-full flex items-center justify-center bg-black/5" id="bg-tab-dashboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                </div>
            </button>
            <button onclick="switchTab('debts')" id="tab-debts" class="flex flex-col items-center gap-1.5 text-textMuted">
                <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors" id="bg-tab-debts">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </div>
            </button>
            <button onclick="switchTab('analytics')" id="tab-analytics" class="flex flex-col items-center gap-1.5 text-textMuted">
                <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors" id="bg-tab-analytics">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                </div>
            </button>
        </nav>

        <!-- МОДАЛКА: ДЕТАЛИ -->
        <div id="modal-detail" class="fixed inset-0 bg-black/20 z-50 backdrop-blur-sm hidden items-end justify-center">
            <div class="w-full max-w-md liquid-glass-modal rounded-t-[40px] p-6 space-y-6 transform translate-y-full transition-transform duration-300 animate-slide-up pb-10">
                <div class="w-12 h-1.5 bg-black/20 rounded-full mx-auto -mt-2"></div>
                
                <div class="flex justify-between items-start">
                    <div>
                        <span id="detail-badge" class="px-3 py-1 rounded-full text-[11px] font-extrabold uppercase tracking-wide bg-black text-white">Статус</span>
                        <h2 id="detail-name" class="text-2xl font-black text-black mt-3">Имя</h2>
                        <p id="detail-date" class="text-sm font-medium text-textMuted mt-1">Открыт: —</p>
                    </div>
                    <button onclick="closeDetailModal()" class="w-10 h-10 rounded-full bg-black/5 flex items-center justify-center text-black font-bold">✕</button>
                </div>

                <div class="liquid-input rounded-[28px] p-5 text-center shadow-sm">
                    <p class="text-sm font-semibold text-textMuted">Остаток</p>
                    <p id="detail-amount" class="text-4xl font-black text-black my-1">0 смн</p>
                    <p id="detail-original" class="text-xs font-bold text-textMuted">Из 0 смн</p>
                </div>

                <!-- Быстрый платеж -->
                <div class="flex gap-2 bg-black/5 p-2 rounded-3xl">
                    <input type="number" id="repay-input" placeholder="Сумма" class="flex-1 bg-transparent border-none px-4 text-base font-bold text-black focus:outline-none placeholder-black/30">
                    <button onclick="submitRepayment()" class="bg-black text-white text-sm font-bold px-6 py-3.5 rounded-2xl hover:scale-105 transition-transform shadow-lg">Оплатить</button>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="triggerEditFromDetail()" class="flex-1 bg-black/5 hover:bg-black/10 text-black text-sm font-bold py-4 rounded-3xl transition">Изменить</button>
                    <button onclick="deleteDebtFromDetail()" class="flex-1 bg-iosRed/10 text-iosRed text-sm font-bold py-4 rounded-3xl transition">Удалить</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА: ФОРМА -->
        <div id="modal-form" class="fixed inset-0 bg-black/20 z-50 backdrop-blur-sm hidden items-end justify-center">
            <div class="w-full max-w-md liquid-glass-modal rounded-t-[40px] p-6 space-y-6 transform translate-y-full transition-transform duration-300 animate-slide-up pb-10">
                <div class="w-12 h-1.5 bg-black/20 rounded-full mx-auto -mt-2"></div>
                
                <div class="flex justify-between items-center mb-2">
                    <h2 id="form-title" class="text-2xl font-black">Новый долг</h2>
                    <button onclick="closeFormModal()" class="w-10 h-10 rounded-full bg-black/5 flex items-center justify-center text-black font-bold">✕</button>
                </div>

                <form id="debt-form" onsubmit="saveDebtForm(event)" class="space-y-4">
                    <input type="hidden" id="form-id">
                    
                    <div>
                        <input type="text" id="form-name" required placeholder="Имя человека" class="w-full liquid-input rounded-2xl px-5 py-4 text-lg font-bold text-black focus:outline-none focus:ring-2 ring-black/20 placeholder-black/30">
                    </div>

                    <div>
                        <input type="number" id="form-amount" required placeholder="Сумма (смн)" class="w-full liquid-input rounded-2xl px-5 py-4 text-lg font-bold text-black focus:outline-none focus:ring-2 ring-black/20 placeholder-black/30">
                    </div>

                    <div>
                        <input type="date" id="form-date" required class="w-full liquid-input rounded-2xl px-5 py-4 text-base font-semibold text-textMuted focus:outline-none">
                    </div>

                    <button type="submit" class="w-full bg-black text-white text-lg font-bold py-4 rounded-3xl transition mt-4 shadow-xl active:scale-95">
                        Сохранить
                    </button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // Адаптированные данные в единой валюте (сомони)
        const mockDebts = [
            { id: "1", name: "Апаи Шахло", amount: 66500, originalAmount: 66500, currency: "смн", openedAt: "2026-03-30", progress: 0, status: "active" },
            { id: "2", name: "Хусенни Хотуни", amount: 3210, originalAmount: 8980, currency: "смн", openedAt: "2026-03-31", progress: 64, status: "partial" },
            { id: "3", name: "Нигора Парда", amount: 4700, originalAmount: 10700, currency: "смн", openedAt: "2026-04-06", progress: 56, status: "partial" },
            { id: "4", name: "Шахло Тилло", amount: 250, originalAmount: 670, currency: "смн", openedAt: "2025-04-18", progress: 62, status: "partial" },
            { id: "5", name: "Зарина", amount: 15, originalAmount: 25, currency: "смн", openedAt: "2025-05-06", progress: 40, status: "partial" },
            { id: "6", name: "Апаи Таманно", amount: 55, originalAmount: 75, currency: "смн", openedAt: "2025-05-12", progress: 26, status: "partial" },
            { id: "7", name: "Апаи Хурсанд", amount: 45, originalAmount: 75, currency: "смн", openedAt: "2025-06-05", progress: 40, status: "partial" },
            { id: "8", name: "Дилором Москва", amount: 9090, originalAmount: 9090, currency: "смн", openedAt: "2026-05-21", progress: 0, status: "active" },
            { id: "9", name: "Парвина Тилло", amount: 2140, originalAmount: 2140, currency: "смн", openedAt: "2026-05-23", progress: 0, status: "active" },
            { id: "10", name: "Хуршед", amount: 1600, originalAmount: 1600, currency: "смн", openedAt: "2026-05-23", progress: 0, status: "active" }
        ];

        let debts = [];
        let currentTab = 'dashboard';
        let currentFilter = 'all';
        let selectedDebtId = null;
        let chartInstance = null;

        window.addEventListener('DOMContentLoaded', () => {
            const dateStr = new Date().toLocaleDateString('ru-RU', { month: 'long', day: 'numeric' });
            document.getElementById('header-date').innerText = dateStr;
            
            if (!localStorage.getItem('onyx_debts_v2')) {
                localStorage.setItem('onyx_debts_v2', JSON.stringify(mockDebts));
            }
            
            loadData();
            switchTab('dashboard');

            document.getElementById('search-input').addEventListener('input', renderDebtsList);
        });

        function loadData() {
            debts = JSON.parse(localStorage.getItem('onyx_debts_v2')) || [];
            calculateMetrics();
        }

        function saveData() {
            localStorage.setItem('onyx_debts_v2', JSON.stringify(debts));
            calculateMetrics();
        }

        function calculateMetrics() {
            let activeAmount = 0; 
            let originalAmount = 0;

            debts.forEach(d => {
                if (d.status !== 'settled') {
                    activeAmount += d.amount;
                    originalAmount += d.originalAmount;
                }
            });

            document.getElementById('stat-total-amount').innerText = `${activeAmount.toLocaleString()} смн`;
            document.getElementById('stat-total-original').innerText = `Изначально: ${originalAmount.toLocaleString()} смн`;

            let globalProgress = 0;
            if (originalAmount > 0) {
                globalProgress = Math.round(((originalAmount - activeAmount) / originalAmount) * 100);
            }
            document.getElementById('global-progress-percent').innerText = `${globalProgress}%`;
            document.getElementById('global-progress-bar').style.width = `${globalProgress}%`;

            renderDashboardTop();
            if (currentTab === 'analytics') initChart();
        }

        function switchTab(tabName) {
            currentTab = tabName;
            
            ['dashboard', 'debts', 'analytics'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('text-black');
                document.getElementById(`tab-${t}`).classList.add('text-textMuted');
                document.getElementById(`bg-tab-${t}`).classList.remove('bg-black/5');
            });

            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).classList.add('text-black');
            document.getElementById(`tab-${tabName}`).classList.remove('text-textMuted');
            document.getElementById(`bg-tab-${tabName}`).classList.add('bg-black/5');

            const titles = { 'dashboard': 'Главная', 'debts': 'Долги', 'analytics': 'Обзор' };
            document.getElementById('page-title').innerText = titles[tabName];

            if (tabName === 'debts') renderDebtsList();
            if (tabName === 'analytics') {
                initChart();
                document.getElementById('insight-count').innerText = debts.length;
                let activeDebts = debts.filter(d => d.status !== 'settled');
                let avg = activeDebts.reduce((sum, d) => sum + d.amount, 0) / (activeDebts.length || 1);
                document.getElementById('insight-avg').innerText = `${Math.round(avg).toLocaleString()} смн`;
                document.getElementById('insight-closed').innerText = debts.filter(d => d.status === 'settled').length;
            }
        }

        function renderDashboardTop() {
            const container = document.getElementById('dashboard-top-debts');
            container.innerHTML = '';
            
            const highDebts = [...debts].filter(d => d.status !== 'settled').sort((a, b) => b.amount - a.amount).slice(0, 3);

            if(highDebts.length === 0) {
                container.innerHTML = `<p class="text-sm text-textMuted text-center py-4">Нет активных долгов</p>`;
                return;
            }

            highDebts.forEach(d => {
                const item = document.createElement('div');
                item.className = 'liquid-glass rounded-3xl p-4 flex justify-between items-center cursor-pointer active:scale-95 transition-transform';
                item.onclick = () => openDetailModal(d.id);
                item.innerHTML = `
                    <div>
                        <p class="text-base font-bold text-black">${d.name}</p>
                        <p class="text-[11px] font-semibold text-textMuted mt-0.5">${d.progress}% выплачено</p>
                    </div>
                    <p class="text-lg font-black tracking-tight text-black">${d.amount.toLocaleString()} смн</p>
                `;
                container.appendChild(item);
            });
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            ['all', 'active', 'partial'].forEach(f => {
                document.getElementById(`filter-${f}`).className = "flex-1 py-2 text-sm font-semibold rounded-2xl bg-white/30 text-textMuted transition";
            });
            document.getElementById(`filter-${filterType}`).className = "flex-1 py-2 text-sm font-bold rounded-2xl liquid-glass text-black";
            renderDebtsList();
        }

        function renderDebtsList() {
            const container = document.getElementById('debts-list-container');
            container.innerHTML = '';
            const query = document.getElementById('search-input').value.toLowerCase();

            let filtered = debts.filter(d => {
                if (!d.name.toLowerCase().includes(query)) return false;
                if (currentFilter === 'active') return d.status === 'active';
                if (currentFilter === 'partial') return d.status === 'partial';
                return true;
            });

            filtered.forEach(d => {
                const card = document.createElement('div');
                let opacity = d.status === 'settled' ? 'opacity-50' : '';
                
                card.className = `liquid-glass rounded-[28px] p-5 cursor-pointer active:scale-[0.98] transition-transform ${opacity}`;
                card.onclick = () => openDetailModal(d.id);

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="text-lg font-bold text-black">${d.name}</h4>
                        <p class="text-xl font-black ${d.status === 'settled' ? 'text-iosGreen' : 'text-black'}">
                            ${d.status === 'settled' ? 'Закрыт' : `${d.amount.toLocaleString()} <span class="text-sm">смн</span>`}
                        </p>
                    </div>
                    <div class="w-full bg-black/5 h-2 rounded-full overflow-hidden">
                        <div class="h-full bg-black rounded-full" style="width: ${d.progress}%"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Модалки
        function openDetailModal(id) {
            selectedDebtId = id;
            const d = debts.find(x => x.id === id);
            if (!d) return;

            document.getElementById('detail-name').innerText = d.name;
            document.getElementById('detail-amount').innerText = `${d.amount.toLocaleString()} смн`;
            document.getElementById('detail-original').innerText = `Из ${d.originalAmount.toLocaleString()} смн`;
            document.getElementById('repay-input').value = '';

            const badge = document.getElementById('detail-badge');
            badge.innerText = d.status === 'active' ? 'Новый' : d.status === 'partial' ? 'В процессе' : 'Закрыт';
            badge.className = `px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider ${d.status === 'settled' ? 'bg-iosGreen text-white' : 'bg-black text-white'}`;

            const modal = document.getElementById('modal-detail');
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }

        function closeDetailModal() {
            document.getElementById('modal-detail').classList.add('hidden');
            document.getElementById('modal-detail').classList.remove('flex');
        }

        function submitRepayment() {
            const val = parseFloat(document.getElementById('repay-input').value);
            if (isNaN(val) || val <= 0) return alert('Введите корректную сумму');

            const d = debts.find(x => x.id === selectedDebtId);
            if (val > d.amount) return alert('Сумма превышает остаток!');

            d.amount = Math.max(0, d.amount - val);
            d.progress = Math.round(((d.originalAmount - d.amount) / d.originalAmount) * 100);
            d.status = d.amount === 0 ? 'settled' : 'partial';

            saveData();
            closeDetailModal();
            if (currentTab === 'debts') renderDebtsList();
        }

        function deleteDebtFromDetail() {
            if (confirm('Точно удалить?')) {
                debts = debts.filter(x => x.id !== selectedDebtId);
                saveData();
                closeDetailModal();
                if (currentTab === 'debts') renderDebtsList();
            }
        }

        function openAddModal() {
            document.getElementById('form-title').innerText = 'Новый долг';
            document.getElementById('form-id').value = '';
            document.getElementById('debt-form').reset();
            document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            
            const modal = document.getElementById('modal-form');
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }

        function triggerEditFromDetail() {
            const d = debts.find(x => x.id === selectedDebtId);
            document.getElementById('form-title').innerText = 'Изменить';
            document.getElementById('form-id').value = d.id;
            document.getElementById('form-name').value = d.name;
            document.getElementById('form-amount').value = d.amount;
            document.getElementById('form-date').value = d.openedAt;

            closeDetailModal();
            const modal = document.getElementById('modal-form');
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }

        function closeFormModal() {
            document.getElementById('modal-form').classList.add('hidden');
            document.getElementById('modal-form').classList.remove('flex');
        }

        function saveDebtForm(e) {
            e.preventDefault();
            const id = document.getElementById('form-id').value;
            const name = document.getElementById('form-name').value;
            const amount = parseFloat(document.getElementById('form-amount').value);
            const date = document.getElementById('form-date').value;

            if (id) {
                const d = debts.find(x => x.id === id);
                if(d.amount !== amount) {
                    d.originalAmount = amount;
                    d.progress = 0;
                    d.status = 'active';
                }
                d.name = name; d.amount = amount; d.openedAt = date;
            } else {
                debts.push({ id: String(Date.now()), name, amount, originalAmount: amount, currency: 'смн', openedAt: date, progress: 0, status: 'active' });
            }

            saveData(); closeFormModal();
            if (currentTab === 'debts') renderDebtsList();
        }

        function initChart() {
            const ctx = document.getElementById('chart-analytics').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const active = debts.filter(d => d.status !== 'settled').sort((a,b)=>b.amount-a.amount).slice(0, 5);
            let labels = active.map(d => d.name);
            let data = active.map(d => d.amount);

            if(labels.length === 0) { labels = ['Пусто']; data = [1]; }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#000000', '#333333', '#666666', '#999999', '#cccccc'],
                        borderWidth: 4,
                        borderColor: '#ffffff',
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    cutout: '70%',
                    layout: { padding: 10 }
                }
            });
        }
    </script>
</body>
</html>
